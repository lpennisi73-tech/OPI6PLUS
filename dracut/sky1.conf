# =============================================================================
# sky1.conf — Configuration dracut pour kernel Sky1 OrangePi 6 Plus
# BOOKWORM Sky1 Kernel Builder
#
# Installation: cp sky1.conf /etc/dracut.conf.d/
# L'initramfs sera automatiquement recréé avec ces options
#
# Régénérer manuellement:
#   dracut --force --kver 6.19.0-gentoo-dist /boot/initrd.img-6.19.0-sky1-custom
# =============================================================================

# Drivers critiques à inclure en dur dans l'initramfs
# gpio-cadence : driver GPIO Cadence (s5_gpio) — requis pour régulateurs PCIe
# nvme          : driver NVMe — requis pour accès SSD au boot
# nvme-core     : core NVMe
add_drivers+=" gpio-cadence nvme nvme-core "

# Forcer l'inclusion même si non détecté automatiquement
force_drivers+=" gpio-cadence "

# Modules réseau utiles en recovery
add_drivers+=" r8169 "

# Compression — zstd est plus rapide que gzip
compress="zstd"

# Inclure les outils de debug utiles
install_items+=" /usr/bin/lspci /usr/bin/lsblk "
