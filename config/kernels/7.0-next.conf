KERNEL_VERSION="7.0"
KERNEL_FULL_VERSION="7.0"
KERNEL_TARBALL="linux-7.0.tar.xz"
KERNEL_URL="https://cdn.kernel.org/pub/linux/kernel/v7.x/linux-7.0.tar.xz"

SKY1_TRACK="next"
SKY1_PATCHES_DIR="patches-next"
SKY1_CONFIG="config/config.sky1-next"
SKY1_REPO="https://github.com/Sky1-Linux/linux-sky1.git"

KERNEL_LOCALVERSION="-sky1-custom"
KERNEL_BUILD_NAME="${KERNEL_FULL_VERSION}${KERNEL_LOCALVERSION}"

FORCE_BUILTIN="
ARCH_CIX
PCI_SKY1
PINCTRL_SKY1_BASE
PINCTRL_SKY1
RESET_SKY1
CLK_SKY1_AUDSS
HWSPINLOCK_SKY1
CIX_MBOX
PHY_CIX_PCIE
PHY_CIX_USB2
PHY_CIX_USB3
PHY_CIX_USBDP
NVME_CORE
BLK_DEV_NVME
TYPEC
GPIO_CADENCE
"

FORCE_DISABLED="
PCIE_CADENCE_PLAT
PCIE_CADENCE_PLAT_HOST
"

FIXES="
pci-sky1-link-down-guard
dts-disable-empty-pcie-slots
dts-add-cpu-thermal-zones
dts-disable-unused-dpu
npu-sky1-pm-runtime-fix
"

PATCHES_EXTRA="
9001-trilin-dptx-propagate-of_node-to-audio-pdev
"

STATUS="stable"
TESTED="yes"
TESTED_BY="Kenny/BOOKWORM"
TESTED_DATE="2026-04-15"
NOTES="Track Next — 30 patches pour Linux 7.0. Sky1 partiellement upstream."
