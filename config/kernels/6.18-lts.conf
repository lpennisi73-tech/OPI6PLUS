# =============================================================================
# 6.18-lts.conf — Kernel 6.18 track LTS (stable long term)
# BOOKWORM Sky1 Kernel Builder
# =============================================================================

# Version kernel
KERNEL_VERSION="6.18"
KERNEL_FULL_VERSION="6.18.9"
KERNEL_TARBALL="linux-6.18.9.tar.xz"
KERNEL_URL="https://cdn.kernel.org/pub/linux/kernel/v6.x/linux-6.18.9.tar.xz"

# Sky1-Linux track
SKY1_TRACK="lts"
SKY1_PATCHES_DIR="patches"
SKY1_CONFIG="config/config.sky1"
SKY1_REPO="https://github.com/Sky1-Linux/linux-sky1.git"

# Nom du kernel compilé
KERNEL_LOCALVERSION="-sky1-custom"
KERNEL_BUILD_NAME="${KERNEL_FULL_VERSION}${KERNEL_LOCALVERSION}"

# Options kernel critiques — identiques au track latest
FORCE_BUILTIN="
ARCH_CIX
PCI_SKY1
PINCTRL_SKY1_BASE
PINCTRL_SKY1
RESET_SKY1
CLK_SKY1_AUDSS
HWSPINLOCK_SKY1
CIX_MBOX
PHY_CIX_PCIE
PHY_CIX_USB2
PHY_CIX_USB3
PHY_CIX_USBDP
NVME_CORE
BLK_DEV_NVME
TYPEC
GPIO_CADENCE
"

# Options à désactiver
FORCE_DISABLED="
PCIE_CADENCE_PLAT
PCIE_CADENCE_PLAT_HOST
"

# Patches fixes LTS — patch 0118 peut ne pas s'appliquer sur 6.18
# (à vérifier — le conflit ACE-Lite était spécifique à 6.19)
FIXES="
pci-sky1-link-down-guard
dts-disable-empty-pcie-slots
dts-add-cpu-thermal-zones
dts-disable-unused-dpu
"

# Statut
STATUS="stable"
TESTED="no"
TESTED_BY=""
TESTED_DATE=""
NOTES="Track LTS — plus stable, moins de features. Recommandé pour production."
