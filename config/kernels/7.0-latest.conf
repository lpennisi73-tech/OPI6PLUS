# =============================================================================
# 7.0-latest.conf — Kernel 7.0 track Latest (TEMPLATE — non testé)
# BOOKWORM Sky1 Kernel Builder
# =============================================================================

# Version kernel
KERNEL_VERSION="7.0"
KERNEL_FULL_VERSION="7.0.0"
KERNEL_TARBALL="linux-7.0.tar.xz"
KERNEL_URL="https://cdn.kernel.org/pub/linux/kernel/v7.x/${KERNEL_TARBALL}"

# Sky1-Linux track
SKY1_TRACK="latest"
SKY1_PATCHES_DIR="patches-latest"
SKY1_CONFIG="config/config.sky1-latest"
SKY1_REPO="https://github.com/Sky1-Linux/linux-sky1.git"

# Nom du kernel compilé
KERNEL_LOCALVERSION="-sky1-custom"
KERNEL_BUILD_NAME="${KERNEL_FULL_VERSION}${KERNEL_LOCALVERSION}"

# Options kernel critiques à forcer en built-in =y
# (à valider lors du premier build 7.0)
FORCE_BUILTIN="
ARCH_CIX
PCI_SKY1
PINCTRL_SKY1_BASE
PINCTRL_SKY1
RESET_SKY1
CLK_SKY1_AUDSS
HWSPINLOCK_SKY1
CIX_MBOX
PHY_CIX_PCIE
PHY_CIX_USB2
PHY_CIX_USB3
PHY_CIX_USBDP
NVME_CORE
BLK_DEV_NVME
TYPEC
GPIO_CADENCE
"

# Options à désactiver
FORCE_DISABLED="
PCIE_CADENCE_PLAT
PCIE_CADENCE_PLAT_HOST
"

# Patches fixes — à mettre à jour lors du premier build 7.0
# Certains conflits de 6.19 peuvent être résolus en 7.0
# D'autres nouveaux conflits peuvent apparaître
FIXES="
0118-panthor-coherency-fix
pci-sky1-link-down-guard
dts-disable-empty-pcie-slots
"

# Statut
STATUS="template"
TESTED="no"
TESTED_BY=""
TESTED_DATE=""
NOTES="Template basé sur 6.19-latest — à valider quand kernel 7.0 disponible"
