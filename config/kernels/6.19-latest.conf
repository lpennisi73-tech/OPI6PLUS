# =============================================================================
# 6.19-latest.conf — Kernel 6.19 track Latest
# BOOKWORM Sky1 Kernel Builder
# =============================================================================

# Version kernel
KERNEL_VERSION="6.19"
KERNEL_FULL_VERSION="6.19.0"
KERNEL_TARBALL="linux-6.19.tar.xz"
KERNEL_URL="https://cdn.kernel.org/pub/linux/kernel/v6.x/${KERNEL_TARBALL}"

# Sky1-Linux track
SKY1_TRACK="latest"
SKY1_PATCHES_DIR="patches-latest"
SKY1_CONFIG="config/config.sky1-latest"
SKY1_REPO="https://github.com/Sky1-Linux/linux-sky1.git"

# Nom du kernel compilé
KERNEL_LOCALVERSION="-sky1-custom"
KERNEL_BUILD_NAME="${KERNEL_FULL_VERSION}${KERNEL_LOCALVERSION}"

# Options kernel critiques à forcer en built-in =y pour ce track
# (incompatibilités découvertes avec config Gentoo complète)
FORCE_BUILTIN="
ARCH_CIX
PCI_SKY1
PINCTRL_SKY1_BASE
PINCTRL_SKY1
RESET_SKY1
CLK_SKY1_AUDSS
HWSPINLOCK_SKY1
CIX_MBOX
PHY_CIX_PCIE
PHY_CIX_USB2
PHY_CIX_USB3
PHY_CIX_USBDP
NVME_CORE
BLK_DEV_NVME
TYPEC
GPIO_CADENCE
"

# Options à désactiver (incompatibles avec patches Sky1)
FORCE_DISABLED="
PCIE_CADENCE_PLAT
PCIE_CADENCE_PLAT_HOST
"

# Patches fixes spécifiques à ce track
FIXES="
0118-panthor-coherency-fix
pci-sky1-link-down-guard
dts-disable-empty-pcie-slots
"

# Statut
STATUS="stable"
TESTED="yes"
TESTED_BY="Kenny/BOOKWORM"
TESTED_DATE="2026-04-13"
NOTES="Premier boot Gentoo confirmé — GPU Mali-G720 opérationnel"
