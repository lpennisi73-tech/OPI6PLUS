# =============================================================================
# board.conf — Configuration matérielle OrangePi 6 Plus
# BOOKWORM Sky1 Kernel Builder
# =============================================================================

# Board
BOARD="orangepi-6-plus"
BOARD_NAME="Orange Pi 6 Plus"
SOC="cix-cd8180"
SOC_NAME="CIX CD8180 (Sky1)"
ARCH="arm64"

# DTB
DTB_NAME="sky1-orangepi-6-plus.dtb"
DTB_PATH="/boot/dtb/${DTB_NAME}"

# Boot
BOOT_KERNEL="/boot/vmlinuz-${KERNEL_VERSION}-sky1-custom"
BOOT_INITRD="/boot/initrd.img-${KERNEL_VERSION}.0-sky1-custom"
BOOT_DTB="${DTB_PATH}"

# Paramètres kernel obligatoires pour ce board
KERNEL_CMDLINE="acpi=off clk_ignore_unused plymouth.enable=0 rd.plymouth=0 rootwait"
KERNEL_CMDLINE="${KERNEL_CMDLINE} console=tty0 console=ttyAMA2,115200 efi=noruntime"

# UUID root — à personnaliser
ROOT_UUID="2291b1a1-ed37-47ed-8a38-ae55326c38ac"

# Slots PCIe présents sur ce board (les autres sont désactivés dans le DTB)
# a010000 = X8  — NVMe SSD
# a0c0000 = X2  — RTL8126 5GbE eth0
# a0e0000 = X1_1 — RTL8126 5GbE eth1
# a070000 = X4  — VIDE → disabled
# a0d0000 = X1_0 — WiFi → disabled (non monté)
PCIE_ACTIVE="a010000 a0c0000 a0e0000"
PCIE_DISABLED="a070000 a0d0000"

# GPU
GPU="Mali-G720-Immortalis"
GPU_DRIVER="panthor"
GPU_FIRMWARE="arm/mali/arch12.8/mali_csffw.bin"

# Serial debug
SERIAL_PORT="/dev/ttyAMA2"
SERIAL_BAUD="115200"
# BOOT_MODE: ACPI (DeviceTree désactive les sensors SCMI avec BIOS 1.4)
